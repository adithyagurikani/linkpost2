services:
  - type: web
    name: inkpost-api
    env: node
    region: singapore
    rootDir: backend
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: BASE_URL
        value: https://inkpost-api.onrender.com
      - key: FRONTEND_URL
        value: https://inkpost.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ALLOW_REGISTRATION
        value: "true"
